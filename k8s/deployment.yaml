apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-html-app
  template:
    metadata:
      labels:
        app: my-html-app
    spec:
      containers:
        - name: my-html-app
          image: ghcr.io/<YOUR_GITHUB_USERNAME>/my-html-app:1.0
          ports:
            - containerPort: 80
