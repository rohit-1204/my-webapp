<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages for Her ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,500;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4b72;
            --bg-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --card-bg: rgba(255, 255, 255, 0.92);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 15px;
            overflow: hidden;
        }

        /* App Container specifically tuned for Mobile */
        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px; /* Mobile app width */
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(255, 75, 114, 0.2), 
                        inset 0 0 0 1px rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .heart {
            color: var(--primary-color);
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        .header p {
            color: #777;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Horizontally scrollable categories for mobile */
        .categories {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
        }
        
        .categories::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .cat-btn {
            background: transparent;
            border: 1px solid rgba(255, 75, 114, 0.3);
            color: var(--primary-color);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .cat-btn:hover, .cat-btn.active {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(255, 75, 114, 0.3);
        }

        /* The Message Card */
        .message-box {
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 16px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px dashed rgba(255, 75, 114, 0.3);
            position: relative;
        }

        .quote-icon {
            font-size: 24px;
            color: rgba(255, 75, 114, 0.2);
            position: absolute;
            top: 15px;
            left: 20px;
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 20px;
            color: #2c2c2c;
            line-height: 1.6;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 2;
        }

        /* Action Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 5px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-generate {
            grid-column: span 2;
            background: var(--primary-color);
            color: white;
            box-shadow: 0 6px 15px rgba(255, 75, 114, 0.3);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #444;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        /* Animations */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        /* Responsive Tweaks */
        @media (max-width: 380px) {
            .message-text { font-size: 18px; }
            .btn { font-size: 13px; padding: 12px; }
            .header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Notes for Her <span class="heart">❤️</span></h1>
            <p>Because she deserves to smile today.</p>
        </div>

        <!-- Scrollable on mobile -->
        <div class="categories">
            <button class="cat-btn active" onclick="setCategory('romantic', this)">Deep Love</button>
            <button class="cat-btn" onclick="setCategory('morning', this)">Morning</button>
            <button class="cat-btn" onclick="setCategory('flirty', this)">Flirty</button>
            <button class="cat-btn" onclick="setCategory('cheerup', this)">Cheer Her Up</button>
            <button class="cat-btn" onclick="setCategory('night', this)">Goodnight</button>
        </div>

        <div class="message-box">
            <div class="quote-icon">❝</div>
            <div class="message-text" id="wishDisplay">Loading love...</div>
        </div>

        <div class="controls">
            <button class="btn btn-generate" onclick="generateWish()">✨ Tap for a new message</button>
            <button class="btn btn-copy" id="copyBtn" onclick="copyWish()">📋 Copy</button>
            <button class="btn btn-whatsapp" onclick="sendWhatsApp()">💬 Send to WA</button>
        </div>
    </div>

    <script>
        // Database of romantic messages
        const messages = {
            romantic: [
                "I didn't know what love was until I met you. You are my everything.",
                "You are the best thing that’s ever happened to me, and I’m never letting you go.",
                "I look at you and see the rest of my life in front of my eyes.",
                "Thank you for being the reason I smile every single day.",
                "No matter how much time I spend with you, I can never ever get enough of you.",
                "You are my today and all of my tomorrows.",
                "I fall in love with you just a little bit more every day."
            ],
            morning: [
                "Good morning, gorgeous. Waking up knowing you are mine is the best feeling in the world.",
                "The sun is up, the sky is blue, today is beautiful, and so are you. Good morning! ☀️",
                "I hope your morning is as bright and beautiful as your smile.",
                "Just wanted to be the first reason you smile today. Good morning, my love.",
                "Morning babe! I was dreaming of you all night.",
                "Good morning to the woman who makes my heart skip a beat."
            ],
            flirty: [
                "Are you a magician? Because whenever I look at you, everyone else disappears. 😏",
                "I can't concentrate today, I'm too busy thinking about how gorgeous you are.",
                "You look so beautiful right now. I can't even see you, but I just know it.",
                "I was going to say something sweet, but honestly, I just really want to kiss you right now.",
                "Do you have a map? I keep getting lost in your eyes.",
                "Stop making me think about you! I'm busy. (Just kidding, please continue)."
            ],
            cheerup: [
                "I know today is hard, but I’m right here with you. I believe in you so much. ❤️",
                "Take a deep breath, my love. You are stronger than you think, and I've got your back.",
                "Just a reminder: You are brilliant, you are beautiful, and I am so incredibly proud of you.",
                "Whenever you feel overwhelmed, just remember how much I love you.",
                "Sending you the biggest, tightest hug right now. You've got this.",
                "I wish I could take your stress away. Let me pamper you later? 🌹"
            ],
            night: [
                "Sleep well, my angel. I'll be dreaming of you tonight.",
                "I wish I was falling asleep in your arms right now. Goodnight, beautiful.",
                "Close your eyes and rest, my love. I love you to the moon and back.",
                "The hardest part of the day is going to sleep without you next to me. Goodnight! ✨",
                "Sending you sweet kisses before you sleep. Have the most beautiful dreams.",
                "Goodnight to the girl who stole my heart and keeps it safe."
            ]
        };

        let currentCategory = 'romantic';
        let currentWish = "";

        // Function to change category
        function setCategory(category, element) {
            currentCategory = category;
            
            // Scroll category button into view on mobile
            element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            
            // Update active button styling
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            generateWish();
        }

        // Function to generate a random wish
        function generateWish() {
            const categoryArray = messages[currentCategory];
            let newWish = currentWish;
            
            // Ensure we don't show the exact same message twice in a row
            while (newWish === currentWish) {
                const randomIndex = Math.floor(Math.random() * categoryArray.length);
                newWish = categoryArray[randomIndex];
            }
            
            currentWish = newWish;
            
            // Fade and slight scale effect for elegance
            const wishElement = document.getElementById('wishDisplay');
            wishElement.style.opacity = 0;
            wishElement.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                wishElement.innerText = currentWish;
                wishElement.style.opacity = 1;
                wishElement.style.transform = 'translateY(0)';
            }, 300); 
        }

        // Function to copy text
        function copyWish() {
            navigator.clipboard.writeText(currentWish).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.innerHTML;
                
                copyBtn.innerHTML = "✅ Copied!";
                copyBtn.style.background = "#d4edda";
                copyBtn.style.color = "#155724";

                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.background = "#f0f0f0";
                    copyBtn.style.color = "#444";
                }, 2000);
            });
        }

        // Send directly to WhatsApp
        function sendWhatsApp() {
            // Check if on mobile or desktop to open appropriate WA link
            const text = encodeURIComponent(currentWish);
            const whatsappUrl = `https://api.whatsapp.com/send?text=${text}`;
            window.open(whatsappUrl, '_blank');
        }

        // Initialize with a random wish on load
        window.onload = generateWish;
    </script>

</body>
</html>
