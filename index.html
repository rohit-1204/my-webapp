<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Piya ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,500;1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff3366;
            --bg-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Background Floating Hearts */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            animation: floatUp linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* App Container */
        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(255, 51, 102, 0.3), 
                        inset 0 0 0 2px rgba(255,255,255,0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary-color);
            font-size: 46px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            color: #666;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* The Message Card */
        .message-box {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 24px;
            color: #2c2c2c;
            line-height: 1.6;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        /* Progress Bar for the 10 seconds */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 51, 102, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff758c, #ff3366);
            border-radius: 10px;
        }

        /* Responsive Tweaks */
        @media (max-width: 380px) {
            .message-text { font-size: 21px; }
            .header h1 { font-size: 40px; }
            .app-container { padding: 35px 20px; }
        }
    </style>
</head>
<body>

    <!-- Background Hearts Animation Container -->
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="app-container">
        <div class="header">
            <h1>For Piya ❤️</h1>
            <p>READ THIS CAREFULLY...</p>
        </div>

        <div class="message-box">
            <div class="message-text" id="wishDisplay">Loading my heart for you...</div>
        </div>

        <!-- Timer Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script>
        // Create Floating Hearts in Background
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const hearts = ['❤️', '💍', '✨', '💕', '🌹'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's'; // 4 to 7 seconds
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px'; // 15px to 30px
                
                container.appendChild(heart);
                
                // Remove heart after it floats up
                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }, 500); // New heart every 500ms
        }
        createHearts();

        // Database of pure proposal messages for Piya
        const proposeMessages = [
            "Piya, from the exact moment I met you, my soul knew it had found its home. Will you be mine forever? 💍",
            "I want to wake up next to you for the rest of my entire life. Piya, I love you endlessly. Will you marry me? ❤️",
            "Piya, you made my life a beautiful fairytale. I want to write the rest of the chapters with you. Will you be my wife?",
            "Every time I look into your beautiful eyes, I see my future. Piya, will you make me the happiest man alive? 💍",
            "Holding your hand makes me feel like I can conquer the world. I want to hold it forever, Piya. Marry me?",
            "I don't just want you for a season, Piya. I want you for every single day of my life. Will you say yes? 💍",
            "Piya, my love for you grows stronger with every passing second. Be my forever? ❤️"
        ];

        let currentIndex = 0;
        const displayTime = 10000; // 10 seconds per message

        // Function to show the next message with animation
        function showNextMessage() {
            const wishElement = document.getElementById('wishDisplay');
            const progressBar = document.getElementById('progressBar');
            
            // 1. Fade out current text
            wishElement.style.opacity = 0;
            wishElement.style.transform = 'translateY(15px) scale(0.95)';
            
            // 2. Stop progress bar instantly
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';

            setTimeout(() => {
                // 3. Change text while invisible
                wishElement.innerText = `"${proposeMessages[currentIndex]}"`;
                
                // 4. Fade in new text
                wishElement.style.opacity = 1;
                wishElement.style.transform = 'translateY(0) scale(1)';
                
                // 5. Start progress bar animation for 10 seconds
                setTimeout(() => {
                    progressBar.style.transition = `width ${displayTime}ms linear`;
                    progressBar.style.width = '100%';
                }, 50);

                // 6. Move to next index for the next cycle
                currentIndex = (currentIndex + 1) % proposeMessages.length;

            }, 600); // Wait 600ms for the fade-out animation to finish before swapping text
        }

        // Initialize
        window.onload = () => {
            // Show the first message immediately
            showNextMessage();
            
            // Change message every 10 seconds
            setInterval(showNextMessage, displayTime);
        };
    </script>

</body>
</html>
